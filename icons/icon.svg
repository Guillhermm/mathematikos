<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="#8B4513"/>
  <!-- Inner decorative ring -->
  <circle cx="256" cy="256" r="220" fill="none" stroke="#DAA520" stroke-width="8"/>
  <!-- Letter M -->
  <text x="256" y="300" font-family="Georgia, serif" font-size="200" font-weight="bold"
        fill="#FFF8DC" text-anchor="middle" dominant-baseline="middle">M</text>
  <!-- Small decorative dots at compass points -->
  <circle cx="256" cy="48"  r="12" fill="#DAA520"/>
  <circle cx="256" cy="464" r="12" fill="#DAA520"/>
  <circle cx="48"  cy="256" r="12" fill="#DAA520"/>
  <circle cx="464" cy="256" r="12" fill="#DAA520"/>
</svg>
